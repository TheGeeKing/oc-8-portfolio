map $http_accept $markdown_suffix {
  default "";
  "~*text/markdown\s*;\s*q=0(?:\.0+)?(?:\s|,|$)" "";
  "~*text/markdown" ".md";
}

map "$markdown_suffix:$uri" $markdown_tokens {
  default "";
  ".md:/" "1118";
  ".md:/skills" "1668";
  ".md:/skills/" "1668";
  ".md:/index.md" "1118";
  ".md:/skills.md" "1668";
  ":/index.md" "1118";
  ":/skills.md" "1668";
}

server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  add_header Vary Accept always;
  add_header X-Markdown-Tokens $markdown_tokens always;

  location = / {
    default_type text/markdown;
    try_files /index$markdown_suffix /index.html =404;
  }

  location = /skills {
    default_type text/markdown;
    try_files /skills$markdown_suffix /skills.html /skills/index.html =404;
  }

  location = /skills/ {
    default_type text/markdown;
    try_files /skills$markdown_suffix /skills/index.html =404;
  }

  location ~ \.md$ {
    default_type text/markdown;
    add_header X-Robots-Tag "noindex" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html $uri/index.html =404;
  }
}
